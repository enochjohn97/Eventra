<header class="header">
    <div class="header-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search for events, tickets, or media...">
    </div>
    <div class="header-actions">
        <div class="action-icon" data-drawer="notifications" title="Notifications">🔔</div>
        <div class="action-icon" data-drawer="settings" title="Settings">⚙️</div>

        <!-- ── Profile Dropdown Trigger ──────────────────────────────── -->
        <div class="user-profile" id="userProfileTrigger" style="position:relative; cursor:pointer; user-select:none;">
            <div class="user-avatar user-avatar-display"></div>
            <div style="text-align:left; line-height:1.2;">
                <div class="user-name-display" id="headerUserName" style="font-weight:700; font-size:0.9rem;">Loading...</div>
                <div class="user-custom-id-display" id="headerCustomId" style="font-size:0.72rem; color:var(--client-text-muted); font-family:monospace; letter-spacing:0.5px;"></div>
            </div>
            <span id="headerDropdownChevron" style="display:inline-flex; align-items:center; margin-left:5px; color:var(--client-text-muted); transition:transform 0.25s;">
                <i data-lucide="chevron-down" style="width: 16px; height: 16px;"></i>
            </span>

            <!-- ── Dropdown Menu ────────────────────────────────────── -->
            <div id="profileDropdown" style="
                display:none; position:absolute; top:calc(100% + 10px); right:0;
                min-width:220px; background:#fff; border-radius:14px;
                box-shadow:0 8px 32px rgba(0,0,0,0.14); border:1px solid #f1f5f9;
                z-index:9999; overflow:hidden; animation:dropdownFadeIn 0.18s ease;">

                <!-- User info block -->
                <div style="padding:14px 16px 10px; border-bottom:1px solid #f1f5f9;">
                    <div id="dropdownUserEmail" style="font-weight:700; font-size:0.95rem; color:#111827;"></div>
                    <div id="dropdownCustomId" style="font-size:0.75rem; color:#6b7280; font-family:monospace; margin-top:2px;"></div>
                </div>

                <!-- Profile -->
                <a href="#" id="dropdownProfileLink" onclick="if(typeof showProfileEditModal==='function')showProfileEditModal();document.getElementById('profileDropdown').style.display='none';return false;"
                   style="display:flex; align-items:center; gap:10px; padding:11px 16px; color:#374151; text-decoration:none; font-size:0.88rem; font-weight:600; transition:background 0.15s;"
                   onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                    Profile
                </a>

                <div style="border-top:1px solid #f1f5f9; margin-top:5px;"></div>

                <!-- Logout -->
                <a href="#" onclick="logout();return false;" class="logout-link"
                   style="display:flex; align-items:center; gap:10px; padding:11px 16px; color:#ef4444; text-decoration:none; font-size:0.88rem; font-weight:600; transition:background 0.15s;"
                   onmouseover="this.style.background='#fff1f2'" onmouseout="this.style.background='transparent'">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Logout
                </a>
            </div>
        </div>
    </div>
</header>

<style>
@keyframes dropdownFadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>

<script>
(function() {
    const trigger  = document.getElementById('userProfileTrigger');
    const dropdown = document.getElementById('profileDropdown');
    const chevron  = document.getElementById('headerDropdownChevron');
    if (!trigger || !dropdown) return;

    trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        const isOpen = dropdown.style.display === 'block';
        dropdown.style.display = isOpen ? 'none' : 'block';
        if (chevron) chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
    });

    document.addEventListener('click', function(e) {
        if (!trigger.contains(e.target)) {
            dropdown.style.display = 'none';
            if (chevron) chevron.style.transform = 'rotate(0deg)';
        }
    });

    // Populate dropdown user info from storage
    function populateHeaderDropdown(user) {
        if (!user) return;
        const name = user.name || user.business_name || 'Client';
        const cid  = user.custom_id ? '#' + user.custom_id : '';

        const headerName = document.getElementById('headerUserName');
        const headerCid  = document.getElementById('headerCustomId');
        const dropEmail   = document.getElementById('dropdownUserEmail');
        const dropCid    = document.getElementById('dropdownCustomId');

        if (headerName) headerName.textContent = name;
        if (headerCid)  headerCid.textContent  = cid;
        if (dropEmail)  dropEmail.textContent  = user.email || '';
        if (dropCid)    dropCid.textContent    = cid;
        if (window.lucide) window.lucide.createIcons();
    }

    // Try storage immediately
    if (window.storage && typeof window.storage.getUser === 'function') {
        populateHeaderDropdown(window.storage.getUser());
    }

    // Listen for profile updates
    document.addEventListener('EventraProfileUpdated', function(e) {
        populateHeaderDropdown(e.detail);
    });
    document.addEventListener('auth:sync', function(e) {
        if (e.detail && e.detail.user) populateHeaderDropdown(e.detail.user);
    });

    window._populateHeaderDropdown = populateHeaderDropdown;
})();
</script>
