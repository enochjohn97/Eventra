<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Scanner | Eventra</title>
    <link rel="stylesheet" href="../css/client-style.css">
    <link rel="stylesheet" href="../../public/css/modals.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --scanner-bg: #0f172a;
            --scanner-primary: #2ecc71;
            --scanner-success: #10b981;
            --scanner-error: #ef4444;
        }

        body {
            background: var(--scanner-bg);
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .scanner-layout {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .scanner-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        #reader {
            flex: 1;
            width: 100% !important;
            border: none !important;
        }

        #reader__scan_region {
            background: var(--scanner-bg) !important;
        }

        #reader__dashboard {
            display: none !important;
        }

        .scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw;
            height: 70vw;
            max-width: 300px;
            max-height: 300px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            pointer-events: none;
            z-index: 5;
        }

        .scanner-overlay::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border: 4px solid var(--scanner-primary);
            border-radius: 24px;
            animation: scan-pulse 2s infinite;
        }

        @keyframes scan-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .scanner-footer {
            padding: 2rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
        }

        .scan-status {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #94a3b8;
        }

        .result-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            color: #1e293b;
            border-radius: 32px 32px 0 0;
            padding: 2.5rem;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        }

        .result-panel.active {
            transform: translateY(0);
        }

        .result-type-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .success-bg { background: #ecfdf5; color: #10b981; }
        .error-bg { background: #fef2f2; color: #ef4444; }

        .result-title {
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .result-details {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .detail-label { color: #64748b; }
        .detail-value { font-weight: 600; text-align: right; }

        .btn-next {
            width: 100%;
            background: var(--scanner-primary);
            color: white;
            border: none;
            padding: 1.25rem;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-next:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="scanner-layout">
        <header class="scanner-header">
            <button class="btn-back" onclick="window.location.href='clientDashboard.html'">
                <i data-lucide="arrow-left"></i>
                <span>Back</span>
            </button>
            <div style="font-weight: 700; font-size: 1.1rem; letter-spacing: 1px;">EN-SCANNER</div>
            <div id="flashToggle" style="padding: 10px; cursor: pointer;">
                <i data-lucide="zap"></i>
            </div>
        </header>

        <div style="position: relative; flex: 1;">
            <div id="reader"></div>
            <div class="scanner-overlay" id="scannerOverlay"></div>
        </div>

        <footer class="scanner-footer">
            <div class="scan-status" id="scanMessage">Align QR code within frame</div>
            <p style="font-size: 0.85rem; opacity: 0.6;">Automatic detection enabled</p>
        </footer>
    </div>

    <!-- Result Slide-up Panel -->
    <div id="resultPanel" class="result-panel">
        <div id="resultIcon" class="result-type-icon">
            <i id="statusIcon" data-lucide="check-circle-2" style="width: 32px; height: 32px;"></i>
        </div>
        <h2 id="resultTitle" class="result-title">Access Granted</h2>
        
        <div class="result-details" id="resultDetails">
            <div class="detail-row">
                <span class="detail-label">Attendee</span>
                <span class="detail-value" id="valAttendee">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Event</span>
                <span class="detail-value" id="valEvent">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Ticket ID</span>
                <span class="detail-value" id="valTicketID" style="font-family: monospace;">-</span>
            </div>
        </div>

        <button class="btn-next" onclick="closeResult()">Scan Next Ticket</button>
    </div>

    <script src="../../public/js/utils.js"></script>
    <script src="../../public/js/storage.js"></script>
    <script src="../../public/js/auth-controller.js"></script>
    <script src="../js/scanner.js"></script>
    <script src="../../public/js/heartbeat.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
