<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to your Eventra account to manage and discover experiences" />
  <title>Client Login - Eventra</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../../public/css/login-style.css" />
  <link rel="stylesheet" href="../../public/css/login.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico" />
</head>

<body>
  <div class="login-container">
    <!-- Left Side: Login Form with Glassmorphism -->
    <div class="login-left">
      <div class="login-form-container glass-effect">
        <div id="successMessage" class="success-message"></div>

        <!-- System Error Banner -->
        <div id="databaseErrorBanner" class="error-message" style="
              margin-bottom: 1rem;
              padding: 0.75rem;
              border: 1px solid var(--login-error);
              border-radius: 8px;
              background: rgba(220, 38, 38, 0.1);
              text-align: center;
            "></div>

        <header class="login-header">
          <h1 class="login-title">Welcome Back!</h1>
          <p class="login-signup-prompt" id="signupPrompt">
            Don't have an account?
            <a href="signup.html" class="signup-link">Sign Up</a>
          </p>
        </header>

        <form id="loginForm" class="login-form" autocomplete="off">
          <!-- Email Field -->
          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <div class="input-wrapper">
              <input type="email" id="email" name="email" class="form-input" placeholder="m@example.com"
                autocomplete="off" required />
              <span class="input-icon"><i data-lucide="mail" style="width: 18px; height: 18px"></i></span>
            </div>
            <div id="emailError" class="error-message"></div>
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" class="form-input" placeholder="••••••••"
                autocomplete="new-password" required />
              <span id="togglePassword" class="toggle-password"><i data-lucide="eye"
                  style="width: 18px; height: 18px; color: #fff"></i></span>
            </div>
            <div id="passwordError" class="error-message"></div>
          </div>

          <!-- Options -->
          <div class="form-options">
            <a href="../../public/pages/forgot-password.html" class="forgot-password">Forgot Password?</a>
            <!-- <label class="remember-me">
                <input type="checkbox" id="rememberMe" />
                <span>Remember me</span>
              </label> -->

          </div>

          <!-- Submit Button -->
          <button type="submit" id="loginButton" class="login-button">
            Login
          </button>
        </form>
      </div>
    </div>

    <!-- Right Side: Event Image Slider -->
    <div class="login-right" id="eventSlider">
      <div class="slider-images">
        <!-- Images will be injected here -->
      </div>
      <div class="overlay-gradient"></div>
    </div>
  </div>

  <!-- OTP Modal -->
  <div id="otpModal" class="modal-overlay" style="display: none">
    <div class="modal-content glass-effect">
      <header class="modal-header">
        <h2 class="modal-title" style="color: #fff !important">
          Secure Verification
        </h2>
        <p class="modal-subtitle" style="color: #fff !important">
          A 6-digit code has been sent to your email.
        </p>
      </header>

      <form id="otpForm" class="otp-form">
        <div class="otp-input-wrapper">
          <input type="text" id="otpCode" class="otp-input" placeholder="000000" maxlength="6" pattern="\d{6}" required
            autocomplete="off" />
        </div>
        <div id="otpError" class="error-message"></div>

        <div class="modal-actions">
          <button type="submit" id="verifyOtpButton" class="login-button">
            Verify & Sign In
          </button>
          <button type="button" id="cancelOtpButton" class="cancel-link">
            Cancel
          </button>
        </div>
      </form>

      <p class="resend-prompt">
        Didn't receive a code? <a href="#" id="resendOtpLink">Resend Code</a>
      </p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../../public/js/storage.js"></script>
  <script src="../../public/js/utils.js"></script>
  <script src="../../public/js/auth-controller.js"></script>
  <script src="../js/clientLogin.js?v=2"></script>
  <script>
    lucide.createIcons();
  </script>
</body>

</html>
